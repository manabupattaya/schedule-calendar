<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>スケジュールカレンダー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f9fa;--bg3:#f1f3f4;
  --text:#202124;--text2:#5f6368;--text3:#9aa0a6;
  --border:#dadce0;--border2:#e8eaed;
  --blue:#1a73e8;--blue-bg:#e8f0fe;--blue-text:#185abc;
  --danger:#d93025;--danger-bg:#fce8e6;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Google Sans',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#app{max-width:1100px;margin:0 auto;padding:10px}

/* ── ツールバー ── */
.toolbar{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.tb-row1{display:flex;align-items:center;gap:6px}
.tb-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.month-label{font-size:18px;font-weight:400;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:active{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:500}
.btn-primary:active{background:#1557b0}
.btn-icon{width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:22px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.btn-icon:active{background:var(--bg2)}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0}
.view-btn{padding:8px 16px;border:none;background:var(--bg);color:var(--text2);font-size:13px;cursor:pointer;font-weight:500;-webkit-tap-highlight-color:transparent}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}
.roomkey-wrap{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.roomkey-wrap input{padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;width:120px}

/* ── 月表示 ── */
.cal-grid{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg)}
.weekday{text-align:center;padding:6px 2px;font-size:11px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border2)}
.month-body{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);min-height:60px;padding:3px 2px;background:var(--bg);cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent}
.day-cell:nth-child(7n){border-right:none}
.day-cell:active{background:var(--bg2)}
.day-cell.other-month{background:var(--bg3)}
.day-cell.other-month .day-num{color:var(--text3)}
.day-num{font-size:11px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:0 auto 2px;color:var(--text)}
.day-cell.today .day-num{background:var(--blue);color:#fff;font-weight:500}
.event-pill{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:block}
.more-link{font-size:10px;color:var(--text2);padding:0 3px;cursor:pointer}

/* ── 週表示（スマホ：3日表示）── */
.week-view{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg2)}
.week-nav-label{font-size:13px;color:var(--text2)}
.week-header{display:grid;background:var(--bg);border-bottom:1px solid var(--border)}
.week-header-cell{text-align:center;padding:6px 2px;border-right:1px solid var(--border2)}
.week-header-cell:last-child{border-right:none}
.week-day-name{font-size:10px;color:var(--text2);font-weight:500}
.week-day-num{font-size:20px;font-weight:300;color:var(--text);line-height:1.1}
.today-num{background:var(--blue)!important;color:#fff!important;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:18px}
.week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.week-body{display:grid;max-height:480px;overflow-y:auto;position:relative}
.time-col{border-right:1px solid var(--border2)}
.time-slot{height:48px;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 4px 0 0;font-size:10px;color:var(--text3)}
.day-col{border-right:1px solid var(--border2);position:relative;min-width:0}
.day-col:last-child{border-right:none}
.hour-line{height:48px;border-bottom:1px solid var(--border2)}
.week-event{position:absolute;left:1px;right:1px;border-radius:3px;padding:2px 4px;font-size:10px;cursor:pointer;overflow:hidden;z-index:1;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}
.now-line{position:absolute;left:0;right:0;height:2px;background:#ea4335;z-index:5;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:8px;height:8px;border-radius:50%;background:#ea4335}
.allday-row{display:grid;border-bottom:1px solid var(--border);background:var(--bg)}
.allday-cell{padding:2px 3px;border-right:1px solid var(--border2);min-height:20px}
.allday-cell:last-child{border-right:none}

/* ── モーダル（スマホはシート風）── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal{background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 20px 32px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--radius-lg);padding:24px;max-height:90vh}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
@media(min-width:600px){.modal-handle{display:none}}
.modal h3{font-size:17px;font-weight:500;margin-bottom:14px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;font-size:16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.form-row input:focus,.form-row textarea:focus{outline:2px solid var(--blue);border-color:transparent}
.form-row textarea{height:60px;resize:none;font-size:16px}
.form-row-inline{display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:15px}
.time-pair{display:flex;gap:8px}
.time-pair .form-row{flex:1;margin-bottom:0}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
.btn-cancel-sm{padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius);background:none;color:var(--text2);font-size:14px;cursor:pointer}
.color-row{display:flex;gap:10px;margin-top:6px}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer}

/* ── ポップアップ（スマホ：画面下部固定）── */
.event-popup{position:fixed;z-index:300;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:16px 16px 28px;width:100%;left:0!important;bottom:0;top:auto!important;box-shadow:0 -4px 24px rgba(0,0,0,0.13)}
@media(min-width:600px){
  .event-popup{border-radius:var(--radius-lg);width:280px;bottom:auto;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,0.15)}
}
.popup-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 12px}
@media(min-width:600px){.popup-handle{display:none}}
.popup-title{font-size:16px;font-weight:500;margin-bottom:8px}
.popup-meta{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;margin-bottom:6px}
.popup-btns{display:flex;gap:8px;margin-top:14px}
.btn-sm{padding:9px 16px;border:1px solid var(--border);border-radius:var(--radius);background:none;font-size:13px;cursor:pointer;color:var(--text2);flex:1;text-align:center}
.btn-sm-danger{border-color:#f28b82;color:var(--danger)}

/* ── ローディング・トースト ── */
.loading{display:flex;align-items:center;gap:8px;padding:24px;color:var(--text2);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999;white-space:nowrap}
</style>
</head>
<body>
<div id="app"></div>

<script>
const GAS_URL = 'YOUR_GAS_DEPLOY_URL';
const ROOM_KEY_DEFAULT = 'web';

const COLORS = [
  {bg:'#e8f0fe',text:'#185abc',border:'#4285f4'},
  {bg:'#fce8e6',text:'#c5221f',border:'#ea4335'},
  {bg:'#e6f4ea',text:'#137333',border:'#34a853'},
  {bg:'#fef7e0',text:'#a65f00',border:'#fbbc04'},
  {bg:'#f3e8fd',text:'#6200ea',border:'#a142f4'},
  {bg:'#e0f7fa',text:'#006064',border:'#00bcd4'},
];

let events=[], loading=false, view='month', cur=new Date();
let roomKey=localStorage.getItem('roomKey')||ROOM_KEY_DEFAULT;
let showModal=false, editEvent=null, newDate='';
let popup=null, popupPos={x:0,y:0};
// 週表示のページ（スマホ用：3日単位）
let weekPage=0;

const today=new Date(), todayStr=fmt(today);

function fmt(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function fmtJP(ds){const[y,m,d]=ds.split('-');const wd=['日','月','火','水','木','金','土'][new Date(+y,+m-1,+d).getDay()];return`${+m}月${+d}日(${wd})`;}
function hm(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
function weekStart(d){const c=new Date(d);c.setDate(c.getDate()-c.getDay());return c;}
function isMobile(){return window.innerWidth<600;}

// ── API ──
async function apiGet(year,month){
  const url=`${GAS_URL}?action=list&roomKey=${encodeURIComponent(roomKey)}&year=${year}&month=${month}`;
  const r=await fetch(url);const j=await r.json();return j.events||[];
}
async function apiAdd(ev){const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'add',roomKey,...ev})});return r.json();}
async function apiUpdate(ev){const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'update',...ev})});return r.json();}
async function apiDelete(id){const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'delete',id})});return r.json();}

function fmtOffset(base,days){const d=new Date(base);d.setDate(d.getDate()+days);return fmt(d);}

async function loadEvents(){
  if(GAS_URL.includes('YOUR_GAS')){
    events=[
      {id:'1',title:'チームMTG',date:fmt(today),start:'10:00',end:'11:00',memo:'週次定例',allDay:false,color:0},
      {id:'2',title:'健康診断',date:fmtOffset(today,2),start:'09:00',end:'10:30',memo:'',allDay:false,color:2},
      {id:'3',title:'プロジェクト締切',date:fmtOffset(today,4),start:'',end:'',memo:'第1フェーズ',allDay:true,color:1},
      {id:'4',title:'勉強会',date:fmtOffset(today,7),start:'15:00',end:'16:30',memo:'GAS特集',allDay:false,color:4},
    ];
    return;
  }
  loading=true;render();
  try{
    const ws=weekStart(cur);
    const y=(view==='month'?cur:ws).getFullYear();
    const m=(view==='month'?cur:ws).getMonth()+1;
    events=await apiGet(y,m);
  }catch(e){toast('読み込みエラー');}
  loading=false;
}

// ── render ──
function render(){
  document.getElementById('app').innerHTML=buildApp();
  attachListeners();
  // 週表示：現在時刻付近にスクロール
  if(view==='week'){
    const wb=document.querySelector('.week-body');
    if(wb)wb.scrollTop=Math.max(0,today.getHours()*48-100);
  }
}

function buildApp(){
  const mobile=isMobile();
  const label=view==='month'
    ?`${cur.getFullYear()}年 ${cur.getMonth()+1}月`
    :weekLabel(mobile);
  return`<div>
  <div class="toolbar">
    <div class="tb-row1">
      <button class="btn-icon" id="btn-prev"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label">${label}</span>
      <button class="btn-icon" id="btn-next"><i class="ti ti-chevron-right"></i></button>
      <button class="btn" id="btn-today" style="font-size:12px;padding:6px 10px">今日</button>
      <div class="view-toggle">
        <button class="view-btn${view==='month'?' active':''}" id="btn-month">月</button>
        <button class="view-btn${view==='week'?' active':''}" id="btn-week">週</button>
      </div>
    </div>
    <div class="tb-row2">
      <div class="roomkey-wrap">
        <i class="ti ti-users" style="font-size:13px"></i>
        <input id="inp-roomkey" value="${roomKey}" placeholder="roomKey">
        <button class="btn" id="btn-load" style="font-size:12px;padding:5px 10px">読込</button>
      </div>
      <button class="btn btn-primary" id="btn-add" style="margin-left:auto;padding:8px 14px"><i class="ti ti-plus"></i> 追加</button>
    </div>
  </div>
  ${loading?'<div class="loading"><div class="spinner"></div>読み込み中...</div>':(view==='month'?buildMonth():buildWeek(mobile))}
  ${showModal?buildModal():''}
  ${popup?buildPopup(mobile):''}
</div>`;
}

function weekLabel(mobile){
  const ws=weekStart(cur);
  if(mobile){
    const days=getWeekDays(mobile);
    const s=days[0],e=days[days.length-1];
    return`${s.getMonth()+1}/${s.getDate()} 〜 ${e.getMonth()+1}/${e.getDate()}`;
  }
  const we=new Date(ws);we.setDate(we.getDate()+6);
  return`${ws.getFullYear()}年 ${ws.getMonth()+1}月${ws.getDate()}日〜${we.getMonth()+1}月${we.getDate()}日`;
}

// スマホは3日ずつ表示
function getWeekDays(mobile){
  const ws=weekStart(cur);
  if(!mobile){
    return Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return d;});
  }
  // 3日単位のページング
  const base=new Date(ws);
  base.setDate(base.getDate()+weekPage*3);
  return Array.from({length:3},(_,i)=>{const d=new Date(base);d.setDate(d.getDate()+i);return d;});
}

// ── 月表示 ──
function buildMonth(){
  const y=cur.getFullYear(),m=cur.getMonth();
  const first=new Date(y,m,1);
  const start=new Date(first);start.setDate(start.getDate()-first.getDay());
  const WD=['日','月','火','水','木','金','土'];
  let cells='';
  const d=new Date(start);
  for(let i=0;i<42;i++){
    const ds=fmt(d);
    const dayEvs=events.filter(e=>e.date===ds).sort((a,b)=>hm(a.start)-hm(b.start));
    const isToday=ds===todayStr;
    const other=d.getMonth()!==m;
    const shown=dayEvs.slice(0,2),more=dayEvs.length-2;
    cells+=`<div class="day-cell${other?' other-month':''}${isToday?' today':''}" data-date="${ds}">
  <div class="day-num">${d.getDate()}</div>
  ${shown.map(e=>`<div class="event-pill" style="background:${COLORS[e.color].bg};color:${COLORS[e.color].text}" data-eid="${e.id}">${e.allDay?'●':e.start} ${e.title}</div>`).join('')}
  ${more>0?`<div class="more-link">+${more}</div>`:''}
</div>`;
    d.setDate(d.getDate()+1);
  }
  return`<div class="cal-grid">
  <div class="weekdays">${WD.map(w=>`<div class="weekday">${w}</div>`).join('')}</div>
  <div class="month-body">${cells}</div>
</div>`;
}

// ── 週表示 ──
function buildWeek(mobile){
  const days=getWeekDays(mobile);
  const WD=['日','月','火','水','木','金','土'];
  const colCount=days.length;
  const nowMin=today.getHours()*60+today.getMinutes();
  const todayColIdx=days.findIndex(d=>fmt(d)===todayStr);
  const gridCols=`40px repeat(${colCount},1fr)`;

  const alldayRow=days.map(d=>{
    const ds=fmt(d);
    return`<div class="allday-cell">${events.filter(e=>e.date===ds&&e.allDay).map(e=>`<div class="event-pill" style="background:${COLORS[e.color].bg};color:${COLORS[e.color].text}" data-eid="${e.id}">${e.title}</div>`).join('')}</div>`;
  }).join('');

  const dayCols=days.map((d,ci)=>{
    const ds=fmt(d);
    const evHtml=events.filter(e=>e.date===ds&&!e.allDay).map(e=>{
      const top=hm(e.start)/60*48;
      const h=Math.max((hm(e.end)-hm(e.start))/60*48,20);
      return`<div class="week-event" style="top:${top}px;height:${h}px;background:${COLORS[e.color].bg};color:${COLORS[e.color].text};border-left-color:${COLORS[e.color].border}" data-eid="${e.id}">${e.start} ${e.title}</div>`;
    }).join('');
    const nowHtml=ci===todayColIdx?`<div class="now-line" style="top:${nowMin/60*48}px"><div class="now-dot"></div></div>`:'';
    return`<div class="day-col">${Array.from({length:24},()=>`<div class="hour-line"></div>`).join('')}${evHtml}${nowHtml}</div>`;
  }).join('');

  const mobileNav=mobile?`<div class="week-nav">
    <button class="btn-icon" id="wp-prev" style="width:32px;height:32px;font-size:18px"><i class="ti ti-chevron-left"></i></button>
    <span class="week-nav-label">← 日付を移動 →</span>
    <button class="btn-icon" id="wp-next" style="width:32px;height:32px;font-size:18px"><i class="ti ti-chevron-right"></i></button>
  </div>`:'';

  return`<div class="week-view">
  ${mobileNav}
  <div class="week-header" style="grid-template-columns:${gridCols}">
    <div style="border-right:1px solid var(--border2)"></div>
    ${days.map((d,i)=>{
      const isT=fmt(d)===todayStr;
      const wi=(d.getDay());
      return`<div class="week-header-cell">
        <div class="week-day-name">${WD[wi]}</div>
        <div class="week-day-num${isT?' today-num':''}">${d.getDate()}</div>
      </div>`;
    }).join('')}
  </div>
  <div class="allday-row" style="grid-template-columns:${gridCols}">
    <div style="border-right:1px solid var(--border2);font-size:9px;color:var(--text3);padding:3px 3px 0;text-align:right">終日</div>
    ${alldayRow}
  </div>
  <div class="week-body" style="grid-template-columns:${gridCols}">
    <div class="time-col">${Array.from({length:24},(_,h)=>`<div class="time-slot">${h===0?'':h+':00'}</div>`).join('')}</div>
    ${dayCols}
  </div>
</div>`;
}

// ── モーダル ──
function buildModal(){
  const e=editEvent||{title:'',date:newDate||todayStr,start:'09:00',end:'10:00',memo:'',allDay:false,color:0};
  const isEdit=!!editEvent;
  return`<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>${isEdit?'予定を編集':'予定を追加'}</h3>
    <div class="form-row"><label>タイトル</label><input id="f-title" value="${esc(e.title)}" placeholder="タイトルを入力"></div>
    <div class="form-row"><label>日付</label><input id="f-date" type="date" value="${e.date}"></div>
    <div class="form-row-inline"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:15px"><input type="checkbox" id="f-allday" style="width:18px;height:18px" ${e.allDay?'checked':''}> 終日</label></div>
    <div id="time-fields" class="time-pair" style="${e.allDay?'display:none':''}">
      <div class="form-row"><label>開始</label><input id="f-start" type="time" value="${e.start||'09:00'}"></div>
      <div class="form-row"><label>終了</label><input id="f-end" type="time" value="${e.end||'10:00'}"></div>
    </div>
    <div class="form-row"><label>会場</label><input id="f-venue" value="${esc(e.venue||'')}" placeholder="会場・場所（任意）"></div>
    <div class="form-row"><label>メモ</label><textarea id="f-memo">${esc(e.memo||'')}</textarea></div>
    <div class="form-row"><label>カラー</label>
      <div class="color-row">${COLORS.map((c,i)=>`<div class="color-dot" style="background:${c.border};outline:${e.color===i?'3px solid #202124':'2px solid transparent'};outline-offset:2px" data-ci="${i}"></div>`).join('')}</div>
    </div>
    <div class="modal-btns">
      ${isEdit?`<button class="btn-cancel-sm" id="btn-modal-del" style="border-color:#f28b82;color:var(--danger)">削除</button>`:''}
      <button class="btn-cancel-sm" id="btn-modal-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-modal-save" style="padding:10px 20px;font-size:14px">保存</button>
    </div>
  </div>
</div>`;
}

// ── ポップアップ ──
function buildPopup(mobile){
  const e=popup;
  let posStyle='';
  if(!mobile){
    const left=Math.min(popupPos.x+12,window.innerWidth-300);
    const top=Math.min(popupPos.y,window.innerHeight-200);
    posStyle=`left:${left}px;top:${top}px`;
  }
  return`<div class="event-popup" id="event-popup" style="${posStyle}">
  <div class="popup-handle"></div>
  <div class="popup-title">${esc(e.title)}</div>
  <div class="popup-meta"><i class="ti ti-calendar" style="font-size:15px"></i> ${fmtJP(e.date)}</div>
  ${!e.allDay&&e.start?`<div class="popup-meta"><i class="ti ti-clock" style="font-size:15px"></i> ${e.start}${e.end?' 〜 '+e.end:''}</div>`:`<div class="popup-meta">終日</div>`}
  ${e.venue?`<div class="popup-meta"><i class="ti ti-map-pin" style="font-size:15px"></i> ${esc(e.venue)}</div>`:''}
  ${e.memo?`<div class="popup-meta"><i class="ti ti-notes" style="font-size:15px"></i> ${esc(e.memo)}</div>`:''}
  <div class="popup-btns">
    <button class="btn-sm" id="popup-edit"><i class="ti ti-edit"></i> 編集</button>
    <button class="btn-sm btn-sm-danger" id="popup-del"><i class="ti ti-trash"></i> 削除</button>
  </div>
</div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── リスナー ──
function attachListeners(){
  $('btn-prev')?.addEventListener('click',()=>{
    if(view==='month'){cur.setMonth(cur.getMonth()-1);}
    else{cur.setDate(cur.getDate()-7);weekPage=0;}
    loadEvents().then(render);
  });
  $('btn-next')?.addEventListener('click',()=>{
    if(view==='month'){cur.setMonth(cur.getMonth()+1);}
    else{cur.setDate(cur.getDate()+7);weekPage=0;}
    loadEvents().then(render);
  });
  $('btn-today')?.addEventListener('click',()=>{cur=new Date(today);weekPage=0;loadEvents().then(render);});
  $('btn-month')?.addEventListener('click',()=>{view='month';loadEvents().then(render);});
  $('btn-week')?.addEventListener('click',()=>{view='week';weekPage=0;loadEvents().then(render);});
  $('btn-add')?.addEventListener('click',()=>{editEvent=null;newDate='';showModal=true;popup=null;render();});
  $('btn-load')?.addEventListener('click',()=>{
    const v=$('inp-roomkey').value.trim();
    if(v){roomKey=v;localStorage.setItem('roomKey',v);loadEvents().then(render);}
  });
  $('wp-prev')?.addEventListener('click',()=>{weekPage--;render();});
  $('wp-next')?.addEventListener('click',()=>{weekPage++;render();});

  document.querySelectorAll('.day-cell').forEach(el=>{
    el.addEventListener('click',ev=>{
      if(ev.target.closest('.event-pill,.more-link'))return;
      newDate=el.dataset.date;editEvent=null;showModal=true;popup=null;render();
    });
  });

  document.querySelectorAll('.event-pill,.week-event').forEach(el=>{
    el.addEventListener('click',ev=>{
      ev.stopPropagation();
      const eid=el.dataset.eid;
      popup=events.find(e=>String(e.id)===String(eid))||null;
      const r=el.getBoundingClientRect();
      popupPos={x:r.right,y:r.top};
      render();
    });
  });

  $('modal-overlay')?.addEventListener('click',ev=>{if(ev.target.id==='modal-overlay'){showModal=false;render();}});
  $('btn-modal-cancel')?.addEventListener('click',()=>{showModal=false;render();});
  $('f-allday')?.addEventListener('change',ev=>{$('time-fields').style.display=ev.target.checked?'none':'';});
  document.querySelectorAll('.color-dot').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('.color-dot').forEach(d=>{d.style.outline=d===el?'3px solid #202124':'2px solid transparent';});
    });
  });

  $('btn-modal-save')?.addEventListener('click',async()=>{
    const title=$('f-title').value.trim();
    if(!title){$('f-title').focus();return;}
    const allDay=$('f-allday').checked;
    const selDot=document.querySelector('.color-dot[style*="3px solid"]');
    const color=selDot?parseInt(selDot.dataset.ci):(editEvent?editEvent.color:0);
    const payload={id:editEvent?.id,title,date:$('f-date').value,start:allDay?'':$('f-start').value,end:allDay?'':$('f-end').value,venue:$('f-venue').value,memo:$('f-memo').value,allDay,color};
    showModal=false;loading=true;render();
    try{
      if(editEvent){await apiUpdate(payload);toast('更新しました');}
      else{await apiAdd(payload);toast('登録しました');}
    }catch(err){toast('エラー');}
    editEvent=null;await loadEvents();render();
  });
  $('btn-modal-del')?.addEventListener('click',async()=>{
    if(!editEvent)return;
    showModal=false;loading=true;render();
    try{await apiDelete(editEvent.id);toast('削除しました');}catch(e){toast('エラー');}
    editEvent=null;await loadEvents();render();
  });

  $('event-popup')?.addEventListener('click',ev=>ev.stopPropagation());
  $('popup-edit')?.addEventListener('click',()=>{editEvent={...popup};popup=null;showModal=true;render();});
  $('popup-del')?.addEventListener('click',async()=>{
    const id=popup.id;popup=null;loading=true;render();
    try{await apiDelete(id);toast('削除しました');}catch(e){toast('エラー');}
    await loadEvents();render();
  });

  // ポップアップ外タップで閉じる
  if(popup){
    setTimeout(()=>{
      document.addEventListener('click',ev=>{
        if(!ev.target.closest('#event-popup')&&!ev.target.closest('[data-eid]')){
          popup=null;render();
        }
      },{once:true});
    },50);
  }
}

function $(id){return document.getElementById(id);}
function toast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

loadEvents().then(render);
</script>
</body>
</html>
